version: '3.8'

services:
  postgres:
    image: m.daocloud.io/docker.io/library/postgres:15-alpine
    container_name: ourerp-postgres
    environment:
      POSTGRES_USER: ourerp
      POSTGRES_PASSWORD: ourerp123
      POSTGRES_DB: ourerp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: m.daocloud.io/docker.io/library/redis:7-alpine
    container_name: ourerp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
